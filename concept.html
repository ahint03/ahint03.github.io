<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concept Art | Anastasia Hinton</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <nav id="navbar">
    <ul>
      <li><a href="index.html#home">// home</a></li>
      <li><a href="index.html#aboutme">// about me</a></li>
      <li><a href="index.html#projects">// projects</a></li>
      <li><a href="index.html#experience">// experience</a></li>
      <li><a href="index.html#contact">// contact</a></li>
    </ul>
  </nav>
</header>

<section id="art-hero" class="hero-concept">
  <div class="overlayy">
    <h1>Concept Art</h1>
    <p>Characters, creatures, and worldbuilding studies.</p>
    <p>Click any image to enlarge.</p>
  </div>
</section>

<section id="gallery" class="content-section">
  <h2>Gallery</h2>
  <div class="gallery-container">

    <!-- Swap/add images to match your concept work -->
    <div class="gallery-item">
      <img src="images/char.png" alt="Character Design (in progress)" onclick="openModal(this)">
      <p>Character Design (in progress)</p>
    </div>

    <div class="gallery-item">
      <img src="images/coatl.png" alt="Coatl" onclick="openModal(this)">
      <p>Coatl</p>
    </div>

    <div class="gallery-item">
      <img src="images/seraphina.png" alt="Spring Elf" onclick="openModal(this)">
      <p>Spring Elf</p>
    </div>

    <div class="gallery-item">
      <img src="images/sheriff.jpg" alt="Peacock Sheriff" onclick="openModal(this)">
      <p>Peacock Sheriff</p>
    </div>

    <div class="gallery-item">
      <img src="images/witch.png" alt="Witch" onclick="openModal(this)">
      <p>Witch</p>
    </div>

  </div>
</section>

<div id="imageModal" class="modal" onclick="closeModal()">
  <span class="close" onclick="closeModal()">&times;</span>
  <img class="modal-content" id="modalImage">
  <p id="modalCaption"></p>
</div>

<script>
function openModal(imageElement) {
  const modal = document.getElementById('imageModal');
  const modalImg = document.getElementById('modalImage');
  const modalCaption = document.getElementById('modalCaption');

  modal.style.display = 'block';
  modalImg.src = imageElement.src;
  modalCaption.textContent = imageElement.alt;
}

function closeModal() {
  const modal = document.getElementById('imageModal');
  modal.style.display = 'none';
}
</script>

</body>
</html>
